server {
    listen 443 ssl;
    server_name app.saplingfertilizer.co.za;

    ssl_certificate /etc/letsencrypt/live/app.saplingfertilizer.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.saplingfertilizer.co.za/privkey.pem;

    # API requests → FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10m;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name app.saplingfertilizer.co.za;
    return 301 https://$host$request_uri;
}
